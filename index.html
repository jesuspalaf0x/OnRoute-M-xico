<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>OnRoute México · Traslados y Tours en la Riviera Maya</title>
  <meta name="description" content="Traslados privados, taxi turístico y tours todo incluido desde los aeropuertos de Cancún y Tulum hacia cualquier destino del Caribe mexicano.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/responsive.css">
  <style>
    html, body { margin: 0; padding: 0; background: #f4f5f2; font-family: 'Inter', sans-serif; color: #0a0a0a; }
    * { box-sizing: border-box; }
    #root { min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; }
    input, select, textarea { font-family: inherit; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: #1FA84A !important; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <!-- Config privada (API key, tipo de cambio) -->
  <script src="config.js"></script>
  <!-- Clip SDK para Checkout Transparente -->
  <script src="https://sdk.clip.mx/js/clip-sdk.js"></script>
  <!-- Google Maps Places — callback garantiza que está listo antes de usarlo -->
  <script>
    window.initMapsCallback = function() {
      window.GOOGLE_MAPS_READY = true;
      window.dispatchEvent(new Event('google-maps-ready'));
    };
    (function() {
      var key = window.GOOGLE_MAPS_API_KEY || '';
      if (!key) { console.warn('OnRoute: falta GOOGLE_MAPS_API_KEY en config.js'); return; }
      var s = document.createElement('script');
      s.src = 'https://maps.googleapis.com/maps/api/js?key=' + key + '&libraries=places&language=es&callback=initMapsCallback';
      s.async = true;
      document.head.appendChild(s);
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script src="shared/price-matrix.js"></script>
  <script type="text/babel" src="shared/data.jsx?v=2"></script>
  <script type="text/babel" src="shared/components.jsx?v=2"></script>
  <script type="text/babel" src="shared/quoter.jsx?v=3"></script>
  <script type="text/babel" src="variations/v3-dense.jsx?v=2"></script>
  <script type="text/babel" src="pages/shared-pages.jsx?v=2"></script>
  <script type="text/babel" src="pages/other-pages.jsx?v=2"></script>
  <script type="text/babel">
    function App() {
      const [lang, setLang] = React.useState(() => localStorage.getItem('onroute-lang') || 'es');
      
      const getInitialState = () => {
        const p = window.location.pathname;
        const search = new URLSearchParams(window.location.search);
        
        // Soporte a rutas query param (NUEVO MÉTODO)
        if (search.has('tour')) return { page: 'tour-detail', slug: search.get('tour') };
        if (search.has('p')) {
           const pg = search.get('p');
           if (['tours', 'about', 'contact', 'blog', 'blog-post', 'faq', 'privacy', 'checkout'].includes(pg)) {
               return { page: pg, slug: search.get('slug') };
           }
        }
        
        // Soporte a la ruta vieja ?v=... para compatibilidad
        if (search.get('v')) return { page: 'tour-detail', slug: search.get('v') };

        // Soporte a paths (MÉTODO ANTERIOR, por si acaso)
        if (p.startsWith('/tours/')) return { page: 'tour-detail', slug: p.replace('/tours/', '') };
        if (p === '/tours') return { page: 'tours', slug: null };
        if (p === '/about') return { page: 'about', slug: null };
        if (p === '/contact') return { page: 'contact', slug: null };
        if (p === '/blog') return { page: 'blog', slug: null };
        
        return { page: 'home', slug: null };
      };

      const [route, setRoute] = React.useState(getInitialState);
      const page = route.page;

      React.useEffect(() => { localStorage.setItem('onroute-lang', lang); }, [lang]);
      
      React.useEffect(() => {
        const handlePop = () => setRoute(getInitialState());
        window.addEventListener('popstate', handlePop);
        return () => window.removeEventListener('popstate', handlePop);
      }, []);

      const setPage = (newPage) => {
        setRoute({ page: newPage, slug: route.slug });
        if (newPage === 'home') {
          window.history.pushState(null, '', '/');
        } else if (newPage === 'tour-detail') {
          const slug = window._selectedTour?.slug || route.slug || '';
          window.history.pushState(null, '', `/?tour=${slug}`);
        } else if (newPage === 'blog-post') {
          const slug = window._selectedPost?.slug || route.slug || '';
          window.history.pushState(null, '', `/?p=blog-post&slug=${slug}`);
        } else {
          window.history.pushState(null, '', `/?p=${newPage}`);
        }
        window.scrollTo({ top: 0, behavior: 'instant' });
      };

      const isHome = page === 'home';
      const pageProps = { lang, setLang, page, setPage, routeSlug: route.slug };

      let content;
      if (isHome) {
        content = <window.V3Dense lang={lang} setLang={setLang} onNavigate={setPage} />;
      } else if (page === 'tours') content = <window.ToursPage {...pageProps} />;
      else if (page === 'tour-detail') content = <window.TourDetailPage {...pageProps} />;
      else if (page === 'about') content = <window.AboutPage {...pageProps} />;
      else if (page === 'contact') content = <window.ContactPage {...pageProps} />;
      else if (page === 'blog') content = <window.BlogPage {...pageProps} />;
      else if (page === 'blog-post') content = <window.BlogPostPage {...pageProps} />;
      else if (page === 'faq') content = <window.FAQPage {...pageProps} />;
      else if (page === 'privacy') content = <window.PrivacyPage {...pageProps} />;
      else if (page === 'checkout') content = <window.CheckoutPage {...pageProps} />;
      else content = <div style={{ padding: 40 }}>Página no encontrada: {page}</div>;

      return (
        <>
          {isHome ? (
            content
          ) : (
            <>
              <window.Header lang={lang} setLang={setLang} page={page} setPage={setPage}/>
              {content}
              <window.Footer lang={lang} setPage={setPage}/>
            </>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
