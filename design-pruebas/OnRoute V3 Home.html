<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>OnRoute México · Home (V3)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #f4f5f2; font-family: 'Inter', sans-serif; }
    * { box-sizing: border-box; }
    #root { min-height: 100vh; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="../shared/data.jsx"></script>
  <script type="text/babel" src="../shared/components.jsx"></script>
  <script type="text/babel" src="../variations/v3-dense.jsx"></script>
  <script type="text/babel">
    function App() {
      const [lang, setLang] = React.useState(() => localStorage.getItem('onroute-lang') || 'es');
      React.useEffect(() => localStorage.setItem('onroute-lang', lang), [lang]);
      return (
        <div style={{ height: '100vh', overflow: 'hidden' }}>
          <window.V3Dense lang={lang} setLang={setLang} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
